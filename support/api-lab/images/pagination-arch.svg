<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <rect x="20" y="20" width="220" height="60" rx="6" fill="#eef6ff" stroke="#bbd"/>
  <text x="130" y="55" font-family="Arial" font-size="12" text-anchor="middle" fill="#123">Client (UI)</text>

  <rect x="280" y="20" width="240" height="60" rx="6" fill="#fff7ed" stroke="#f0c"/>
  <text x="400" y="55" font-family="Arial" font-size="12" text-anchor="middle" fill="#123">API Endpoint (cursor)</text>

  <rect x="560" y="20" width="220" height="60" rx="6" fill="#f7fff0" stroke="#bdf"/>
  <text x="670" y="45" font-family="Arial" font-size="12" text-anchor="middle" fill="#123">Database (Postgres)</text>
  <text x="670" y="61" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Index on (created_at, id)</text>

  <line x1="240" y1="50" x2="280" y2="50" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="520" y1="50" x2="560" y2="50" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="400" y="110" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Cursor flow</text>
  <line x1="400" y1="120" x2="400" y2="150" stroke="#999" stroke-dasharray="4 3"/>
  <rect x="300" y="150" width="200" height="40" rx="4" fill="#fff" stroke="#e6e6e6"/>
  <text x="400" y="178" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">nextPageToken / prevPageToken (base64)</text>

</svg>
