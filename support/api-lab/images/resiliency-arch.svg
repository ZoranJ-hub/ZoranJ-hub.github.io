<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <rect x="20" y="20" width="180" height="60" rx="6" fill="#f0f6fb" stroke="#bcd"/>
  <text x="110" y="55" font-family="Arial" font-size="12" text-anchor="middle" fill="#123">Client</text>

  <rect x="260" y="20" width="220" height="60" rx="6" fill="#fff7ed" stroke="#f0c"/>
  <text x="370" y="55" font-family="Arial" font-size="12" text-anchor="middle" fill="#123">API Gateway / Service</text>

