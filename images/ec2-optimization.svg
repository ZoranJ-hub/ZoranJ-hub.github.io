<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="300" y="40" font-size="32" font-weight="bold" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif">EC2 Optimization</text>
  
  <!-- EC2 Instance Icons -->
  <g id="instance1">
    <rect x="50" y="100" width="80" height="80" fill="#ff9900" rx="8"/>
    <text x="90" y="145" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">EC2</text>
  </g>
  
  <g id="instance2">
    <rect x="170" y="100" width="80" height="80" fill="#ff9900" rx="8"/>
    <text x="210" y="145" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">EC2</text>
  </g>
  
  <g id="instance3">
    <rect x="290" y="100" width="80" height="80" fill="#ff9900" rx="8"/>
    <text x="330" y="145" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">EC2</text>
  </g>
  
  <!-- Arrows -->
  <line x1="130" y1="140" x2="170" y2="140" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="140" x2="290" y2="140" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- CloudWatch -->
  <rect x="450" y="100" width="100" height="80" fill="#4b9bff" rx="8"/>
  <text x="500" y="130" font-size="12" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">CloudWatch</text>
  <text x="500" y="150" font-size="11" fill="white" text-anchor="middle" font-family="Arial">Metrics</text>
  
  <!-- Arrows to CloudWatch -->
  <line x1="330" y1="115" x2="450" y2="115" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="330" y1="165" x2="450" y2="165" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Analysis Section -->
  <rect x="50" y="240" width="500" height="120" fill="#1a1a1a" rx="8" stroke="#00d4ff" stroke-width="2"/>
  <text x="60" y="260" font-size="14" font-weight="bold" fill="#00d4ff" font-family="Arial">Utilization Analysis</text>
  <text x="60" y="280" font-size="12" fill="#cccccc" font-family="Arial">• CPU Usage Detection</text>
  <text x="60" y="300" font-size="12" fill="#cccccc" font-family="Arial">• Cost Optimization</text>
  <text x="60" y="320" font-size="12" fill="#cccccc" font-family="Arial">• Presigned URL Security</text>
  <text x="330" y="280" font-size="12" fill="#cccccc" font-family="Arial">• AWS IAM Integration</text>
  <text x="330" y="300" font-size="12" fill="#cccccc" font-family="Arial">• Automated Reporting</text>
  <text x="330" y="320" font-size="12" fill="#cccccc" font-family="Arial">• Multi-Account Support</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff" />
    </marker>
  </defs>
</svg>
