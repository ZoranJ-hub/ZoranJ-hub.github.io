<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="300" y="40" font-size="32" font-weight="bold" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif">API Pagination</text>
  
  <!-- Client UI -->
  <rect x="50" y="90" width="100" height="80" fill="#4b9bff" rx="8"/>
  <text x="100" y="125" font-size="12" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Client UI</text>
  <text x="100" y="145" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Pages</text>
  
  <!-- API Endpoint -->
  <rect x="210" y="90" width="100" height="80" fill="#ff9900" rx="8"/>
  <text x="260" y="125" font-size="12" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">API</text>
  <text x="260" y="145" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Endpoint</text>
  
  <!-- Database with Index -->
  <rect x="370" y="90" width="100" height="80" fill="#569a31" rx="8"/>
  <text x="420" y="120" font-size="12" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Database</text>
  <text x="420" y="140" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Indexed</text>
  
  <!-- Connection arrows -->
  <line x1="150" y1="130" x2="210" y2="130" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="130" x2="370" y2="130" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Pagination Details Section -->
  <rect x="50" y="220" width="500" height="150" fill="#1a1a1a" rx="8" stroke="#00d4ff" stroke-width="2"/>
  <text x="60" y="240" font-size="14" font-weight="bold" fill="#00d4ff" font-family="Arial">Cursor-Based Pagination Strategy</text>
  
  <!-- Left column -->
  <text x="60" y="265" font-size="12" fill="#cccccc" font-family="Arial">✓ Cursor Encoding/Decoding</text>
  <text x="60" y="285" font-size="12" fill="#cccccc" font-family="Arial">✓ WHERE Clause Optimization</text>
  <text x="60" y="305" font-size="12" fill="#cccccc" font-family="Arial">✓ Indexed Queries (created_at, id)</text>
  <text x="60" y="325" font-size="12" fill="#cccccc" font-family="Arial">✓ O(1) Lookup Performance</text>
  
  <!-- Right column -->
  <text x="330" y="265" font-size="12" fill="#cccccc" font-family="Arial">✓ Consistent Results</text>
  <text x="330" y="285" font-size="12" fill="#cccccc" font-family="Arial">✓ Real-Time Data Safety</text>
  <text x="330" y="305" font-size="12" fill="#cccccc" font-family="Arial">✓ No Offset Skipping</text>
  <text x="330" y="325" font-size="12" fill="#cccccc" font-family="Arial">✓ Express.js Implementation</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff" />
    </marker>
  </defs>
</svg>
