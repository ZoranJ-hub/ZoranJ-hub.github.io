<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-labelledby="lobTitle lobDesc">
  <title id="lobTitle">LOB Integration</title>
  <desc id="lobDesc">Simple diagram showing core app, integration layer, job queue, and LOB system with feature list.</desc>
  <rect width="100%" height="100%" fill="#0f2540"/>

  <text x="300" y="40" font-size="28" font-family="Helvetica, Arial, sans-serif" fill="#8bd3ff" text-anchor="middle">LOB Integration</text>

  <g fill="#4b9bff">
    <rect x="50" y="100" width="80" height="80" rx="8"/>
    <text x="90" y="135" font-size="12" fill="#fff" font-family="Helvetica">Core App</text>
  </g>

  <g fill="#ff9900">
    <rect x="180" y="100" width="80" height="80" rx="8"/>
    <text x="220" y="135" font-size="12" fill="#fff" font-family="Helvetica">Integration</text>
  </g>

  <g fill="#569a31">
    <rect x="310" y="100" width="80" height="80" rx="8"/>
    <text x="350" y="135" font-size="12" fill="#fff" font-family="Helvetica">Job Queue</text>
  </g>

  <g fill="#ff3333">
    <rect x="440" y="100" width="80" height="80" rx="8"/>
    <text x="480" y="135" font-size="12" fill="#fff" font-family="Helvetica">LOB System</text>
  </g>

  <!-- Connectors (no markers to improve compatibility) -->
  <line x1="130" y1="140" x2="180" y2="140" stroke="#8bd3ff" stroke-width="2"/>
  <line x1="260" y1="140" x2="310" y2="140" stroke="#ffd29a" stroke-width="2"/>
  <line x1="390" y1="140" x2="440" y2="140" stroke="#8bd3ff" stroke-width="2"/>

  <rect x="50" y="230" width="500" height="140" rx="8" fill="#0b1a2b" stroke="#234d6a"/>
  <text x="75" y="255" font-size="14" fill="#8bd3ff" font-family="Helvetica" font-weight="700">OAuth2 & Webhook Integration</text>

  <text x="80" y="280" font-size="12" fill="#dbeefc">• Webhook validation</text>
  <text x="80" y="300" font-size="12" fill="#dbeefc">• OAuth2 client flow</text>
  <text x="80" y="320" font-size="12" fill="#dbeefc">• Retry, dead-letter & idempotency</text>
  <text x="80" y="340" font-size="12" fill="#dbeefc">• Async workers / job queues</text>

</svg>
