<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-labelledby="s3Title s3Desc">
  <title id="s3Title">S3 Security Architecture</title>
  <desc id="s3Desc">Diagram showing S3 buckets, IAM, KMS encryption, logging and lifecycle rules.</desc>
  <rect width="100%" height="100%" fill="#0f2540"/>

  <!-- Header -->
  <text x="300" y="40" font-size="28" font-family="Helvetica, Arial, sans-serif" fill="#8bd3ff" text-anchor="middle">S3 Security Architecture</text>

  <!-- Buckets -->
  <g fill="#2f8b4b" stroke="#1f5f37" stroke-width="1" rx="6">
    <rect x="60" y="90" width="110" height="80" rx="8"/>
    <rect x="200" y="90" width="110" height="80" rx="8"/>
    <rect x="340" y="90" width="110" height="80" rx="8"/>
  </g>
  <text x="115" y="135" font-size="13" fill="#fff" font-family="Helvetica, Arial">S3 (Logs)</text>
  <text x="255" y="135" font-size="13" fill="#fff" font-family="Helvetica, Arial">S3 (Data)</text>
  <text x="395" y="135" font-size="13" fill="#fff" font-family="Helvetica, Arial">S3 (Archive)</text>

  <!-- IAM block -->
  <rect x="480" y="90" width="95" height="80" rx="8" fill="#3b82f6"/>
  <text x="528" y="125" font-size="12" fill="#fff" font-family="Helvetica, Arial" text-anchor="middle">IAM</text>
  <text x="528" y="142" font-size="11" fill="#e0f2ff" font-family="Helvetica, Arial" text-anchor="middle">Policies</text>

  <!-- KMS -->
  <rect x="480" y="190" width="95" height="60" rx="8" fill="#ff8a00"/>
  <text x="528" y="225" font-size="12" fill="#fff" font-family="Helvetica, Arial" text-anchor="middle">KMS</text>

  <!-- Simple connectors -->
  <line x1="310" y1="170" x2="528" y2="170" stroke="#8bd3ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="170" x2="310" y2="170" stroke="#8bd3ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Feature list box -->
  <rect x="60" y="240" width="515" height="120" rx="8" fill="#0b1a2b" stroke="#234d6a"/>
  <text x="75" y="265" font-size="14" fill="#8bd3ff" font-family="Helvetica, Arial" font-weight="700">Security &amp; Compliance</text>

  <text x="80" y="290" font-size="12" fill="#dbeefc" font-family="Helvetica, Arial">• Default encryption (SSE-S3 or KMS)</text>
  <text x="80" y="310" font-size="12" fill="#dbeefc" font-family="Helvetica, Arial">• Block public access &amp; bucket policies</text>
  <text x="80" y="330" font-size="12" fill="#dbeefc" font-family="Helvetica, Arial">• Versioning, access logging &amp; lifecycle rules</text>
  <text x="80" y="350" font-size="12" fill="#dbeefc" font-family="Helvetica, Arial">• CloudWatch monitoring &amp; SNS alerts</text>

  <!-- subtle border -->
  <rect x="5" y="5" width="590" height="390" fill="none" stroke="#123040" stroke-width="1"/>
</svg>
