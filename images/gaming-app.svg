<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="300" y="40" font-size="32" font-weight="bold" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif">Game Engine</text>
  
  <!-- Game Screen Frame -->
  <rect x="80" y="80" width="440" height="240" fill="#000000" stroke="#00d4ff" stroke-width="3" rx="8"/>
  
  <!-- Game Grid Background -->
  <rect x="85" y="85" width="430" height="230" fill="#1a1a1a"/>
  
  <!-- Player (green rectangle) -->
  <rect x="260" y="250" width="40" height="50" fill="#00ff00"/>
  
  <!-- Enemies (red squares) -->
  <rect x="120" y="140" width="35" height="35" fill="#ff3333" rx="4"/>
  <rect x="330" y="130" width="35" height="35" fill="#ff3333" rx="4"/>
  <rect x="220" y="100" width="35" height="35" fill="#ff3333" rx="4"/>
  
  <!-- Projectiles (yellow lines) -->
  <line x1="280" y1="250" x2="280" y2="180" stroke="#ffff00" stroke-width="3"/>
  <line x1="260" y1="250" x2="260" y2="190" stroke="#ffff00" stroke-width="3"/>
  
  <!-- Explosions (orange circles) -->
  <circle cx="330" cy="150" r="25" fill="none" stroke="#ff9900" stroke-width="2"/>
  <circle cx="330" cy="150" r="18" fill="none" stroke="#ff9900" stroke-width="1.5"/>
  
  <!-- Info Box -->
  <rect x="40" y="340" width="520" height="50" fill="#1a1a1a" rx="6" stroke="#00d4ff" stroke-width="2"/>
  <text x="55" y="360" font-size="12" font-weight="bold" fill="#00d4ff" font-family="Arial">Architecture:</text>
  <text x="200" y="360" font-size="11" fill="#cccccc" font-family="Arial">60 FPS Game Loop • AABB Collision Detection • OOP Entity System • Event Handling</text>
  <text x="55" y="375" font-size="11" fill="#cccccc" font-family="Arial">State Machine • Particle Effects • Score Persistence • Spatial Optimization</text>
</svg>
